<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COO Gap Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Lora:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
/* ============================================================
   CONFIG — Edit this block to customise the tool
   ============================================================ */
const CONFIG = {
  /* Branding */
  title:         "COO Gap Visualizer: Operational Maturity",
  disclaimer:    "Dashed line: World-Class Standard. Adjust sliders to visualise your operational gap.",
  pdfFilename:   "COO-Gap-Analysis.pdf",
  pdfFooterUrl:  "www.negreflorian.com",          // Shown only in PDF export

  /* Radar dimensions — add/remove objects to change axes (max 8 recommended) */
  dimensions: [
    { label: "Processes",       default: 5 },
    { label: "Tech Stack",      default: 5 },
    { label: "Scalability",     default: 5 },
    { label: "Human Capital",   default: 5 },
    { label: "Governance & Data", default: 5 },
  ],

  /* Benchmark line value (same for all axes) */
  benchmark: 9,

  /* Colours */
  accentColor:     "#c15f3c",
  benchmarkColor:  "#e0e0e0",
};
/* ============================================================ */
</script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #fafaf8; padding: 40px 20px; color: #242322; }

.tool-container {
  max-width: 900px; margin: 20px auto; padding: 40px;
  background: #fff; border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  position: relative;
}

h2 {
  text-align: center; font-family: 'Lora', serif; color: #242322;
  margin-bottom: 35px; font-size: 28px;
}

.layout { display: flex; flex-wrap: wrap; gap: 50px; align-items: center; }

.controls { flex: 1; min-width: 300px; }
.chart-area { flex: 1; min-width: 300px; }

.range-group { margin-bottom: 24px; }
.range-group label {
  display: flex; justify-content: space-between;
  font-weight: 600; color: #242322; margin-bottom: 10px; font-size: 15px;
}
input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }

.val-badge {
  font-weight: bold; background: #fff5f2; padding: 2px 12px;
  border-radius: 4px; border: 1px solid #f2d9d0;
}

.btn-export {
  width: 100%; padding: 16px; background: #242322; color: #fff;
  border: none; border-radius: 6px; font-family: 'Inter', sans-serif;
  font-weight: 600; cursor: pointer; transition: background 0.2s;
  margin-top: 15px; text-transform: uppercase; letter-spacing: 0.5px;
  font-size: 0.9rem;
}
.btn-export:hover { background: #454647; }

.disclaimer {
  font-size: 13px; color: #6b7280; text-align: center;
  margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;
}

#pdf-footer { display: none; text-align: center; margin-top: 40px; font-size: 14px; color: #242322; font-weight: 600; }

@media (max-width: 640px) {
  .tool-container { padding: 24px 16px; }
  h2 { font-size: 20px; }
}
</style>
</head>
<body>

<div class="tool-container" id="tool-root">
  <h2 id="cfg-title"></h2>

  <div class="layout">
    <div class="controls" id="sliders-container"></div>
    <div class="chart-area">
      <canvas id="radarChart"></canvas>
    </div>
  </div>

  <button class="btn-export" id="downloadBtn">Download PDF Report</button>
  <p class="disclaimer" id="cfg-disclaimer"></p>
  <div id="pdf-footer"></div>
</div>

<script>
let radarChart;

document.addEventListener('DOMContentLoaded', function () {
  /* ---- Inject CONFIG ---- */
  document.getElementById('cfg-title').textContent      = CONFIG.title;
  document.getElementById('cfg-disclaimer').textContent = CONFIG.disclaimer;
  document.getElementById('pdf-footer').textContent     = CONFIG.pdfFooterUrl;

  /* Set CSS accent variable */
  document.documentElement.style.setProperty('--accent', CONFIG.accentColor);
  document.querySelectorAll('.val-badge').forEach(function(el){ el.style.color = CONFIG.accentColor; });

  /* ---- Build sliders dynamically ---- */
  var container = document.getElementById('sliders-container');
  CONFIG.dimensions.forEach(function (dim, i) {
    var group = document.createElement('div');
    group.className = 'range-group';
    group.innerHTML =
      '<label>' + dim.label +
      ' <span class="val-badge" id="val-' + i + '" style="color:' + CONFIG.accentColor + '">' + dim.default + '</span></label>' +
      '<input type="range" id="input-' + i + '" min="1" max="10" value="' + dim.default + '">';
    container.appendChild(group);
  });

  /* ---- Build radar ---- */
  var ctx = document.getElementById('radarChart').getContext('2d');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: CONFIG.dimensions.map(function(d){ return d.label; }),
      datasets: [
        {
          label: 'Current State',
          data: CONFIG.dimensions.map(function(d){ return d.default; }),
          backgroundColor: hexToRgba(CONFIG.accentColor, 0.2),
          borderColor: CONFIG.accentColor,
          borderWidth: 3,
          pointBackgroundColor: CONFIG.accentColor,
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointRadius: 5,
        },
        {
          label: 'Target Benchmark',
          data: CONFIG.dimensions.map(function(){ return CONFIG.benchmark; }),
          backgroundColor: 'transparent',
          borderColor: CONFIG.benchmarkColor,
          borderWidth: 2,
          borderDash: [5, 5],
          pointRadius: 0,
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        r: {
          min: 0, max: 10, beginAtZero: true,
          ticks: { display: false },
          grid: { color: '#f0f0f0' },
          pointLabels: { font: { family: 'Inter', size: 12, weight: '600' }, color: '#242322' }
        }
      },
      plugins: { legend: { position: 'bottom', labels: { font: { family: 'Inter' } } } }
    }
  });

  /* ---- Wire up sliders ---- */
  CONFIG.dimensions.forEach(function (_, i) {
    document.getElementById('input-' + i).addEventListener('input', function () {
      document.getElementById('val-' + i).textContent = this.value;
      radarChart.data.datasets[0].data[i] = parseInt(this.value);
      radarChart.update('none');
    });
  });

  document.getElementById('downloadBtn').addEventListener('click', downloadPDF);
});

/* ---- PDF export ---- */
async function downloadPDF() {
  var btn    = document.getElementById('downloadBtn');
  var footer = document.getElementById('pdf-footer');
  var root   = document.getElementById('tool-root');

  btn.style.display    = 'none';
  footer.style.display = 'block';

  try {
    var canvas = await html2canvas(root, { scale: 3, useCORS: true, backgroundColor: '#ffffff' });
    var imgData = canvas.toDataURL('image/png');
    var { jsPDF } = window.jspdf;
    var pdf = new jsPDF('l', 'mm', 'a4');
    var pdfW = pdf.internal.pageSize.getWidth();
    var pdfH = (canvas.height * pdfW) / canvas.width;
    pdf.addImage(imgData, 'PNG', 0, 10, pdfW, pdfH);
    pdf.save(CONFIG.pdfFilename);
  } catch (err) {
    console.error('PDF export error:', err);
  } finally {
    btn.style.display    = 'block';
    footer.style.display = 'none';
  }
}

/* ---- Utility ---- */
function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}
</script>
</body>
</html>
